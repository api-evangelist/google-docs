        A link to a Google resource such as a file in Drive, a YouTube video,
        or a Calendar event.
      properties:
        richLinkId:
          type: string
          description: Output only. The ID of this link.
          readOnly: true
          example: '500123'
        richLinkProperties:
          $ref: '#/components/schemas/RichLinkProperties'
        suggestedInsertionIds:
          type: array
          items:
            type: string
          example: []
        suggestedDeletionIds:
          type: array
          items:
            type: string
          example: []
        suggestedTextStyleChanges:
          type: object
          additionalProperties:
            type: object
          example: example_value
        textStyle:
          $ref: '#/components/schemas/TextStyle'

    RichLinkProperties:
      type: object
      description: Properties specific to a RichLink.
      properties:
        title:
          type: string
          description: Output only. The title of the RichLink as displayed in the document.
          readOnly: true
          example: Example Title
        uri:
          type: string
          description: Output only. The URI of the RichLink.
          readOnly: true
          example: example_value
        mimeType:
          type: string
          description: Output only. The MIME type of the RichLink.
          readOnly: true

          example: example_value
    Bullet:
      type: object
      description: Describes the bullet of a paragraph.
      properties:
        listId:
          type: string
          description: The ID of the list this paragraph belongs to.
          example: '500123'
        nestingLevel:
          type: integer
          description: The nesting level of this paragraph in the list.
          example: 10
        textStyle:
          $ref: '#/components/schemas/TextStyle'

    List:
      type: object
      description: >-
        A List represents the list attributes for a group of paragraphs
        that all belong to the same list.
      properties:
        listProperties:
          $ref: '#/components/schemas/ListProperties'
        suggestedListPropertiesChanges:
          type: object
          additionalProperties:
            type: object
          example: example_value
        suggestedInsertionId:
          type: string
          example: '500123'
        suggestedDeletionIds:
          type: array
          items:
            type: string

          example: []
    ListProperties:
      type: object
      description: The properties of a list which describe the look and feel of bullets.
      properties:
        nestingLevels:
          type: array
          description: >-
            Describes the properties of the bullets at the associated level.
            A list has at most 9 levels of nesting.
          items:
            $ref: '#/components/schemas/NestingLevel'

          example: []
    NestingLevel:
      type: object
      description: >-
        Contains properties describing the look and feel of a list bullet
        at a given level of nesting.
      properties:
        bulletAlignment:
          type: string
          description: The alignment of the bullet within the space allotted for rendering.
          enum:
          - BULLET_ALIGNMENT_UNSPECIFIED
          - START
          - CENTER
          - END
          example: BULLET_ALIGNMENT_UNSPECIFIED
        glyphFormat:
          type: string
          description: >-
            The format string used by bullets at this level of nesting.
          example: example_value
        indentFirstLine:
          $ref: '#/components/schemas/Dimension'
        indentStart:
          $ref: '#/components/schemas/Dimension'
        textStyle:
          $ref: '#/components/schemas/TextStyle'
        startNumber:
          type: integer
          description: The number of the first list item at this nesting level.
          example: 10
        glyphType:
          type: string
          description: The type of glyph used by bullets at this nesting level.
          enum:
          - GLYPH_TYPE_UNSPECIFIED
          - NONE
          - DECIMAL
          - ZERO_DECIMAL
          - UPPER_ALPHA
          - ALPHA
          - UPPER_ROMAN
          - ROMAN
          example: GLYPH_TYPE_UNSPECIFIED
        glyphSymbol:
          type: string
          description: A custom glyph symbol used by bullets at this nesting level.

          example: example_value
    NamedRanges:
      type: object
      description: >-
        A collection of all the NamedRanges in the document that share a
        given name.
      properties:
        name:
          type: string
          description: The name that all the named ranges share.
          example: Example Title
        namedRanges:
          type: array
          description: The named ranges that share the same name.
          items:
            $ref: '#/components/schemas/NamedRange'

          example: []
    NamedRange:
      type: object
      description: >-
        A collection of Ranges that have the same named range ID.
      properties:
        namedRangeId:
          type: string
          description: The ID of the named range.
          example: '500123'
        name:
          type: string
          description: The name of the named range.
          example: Example Title
        ranges:
          type: array
          description: The ranges that belong to this named range.
          items:
            $ref: '#/components/schemas/Range'

          example: []
    Range:
      type: object
      description: >-
        Specifies a contiguous range of text.
      properties:
        segmentId:
          type: string
          description: >-
            The ID of the header, footer, or footnote that this range is
            contained in. An empty segment ID signifies the document body.
          example: '500123'
        startIndex:
          type: integer
          description: >-
            The zero-based start index of this range, in UTF-16 code units.
          example: 10
        endIndex:
          type: integer
          description: >-
            The zero-based end index of this range, exclusive, in UTF-16
            code units.
          example: 10
        tabId:
          type: string
          description: The tab that contains this range.

          example: '500123'
    Link:
      type: object
      description: A reference to another portion of a document or an external URL.
      properties:
        url:
          type: string
          description: An external URI.
          example: https://www.example.com
        bookmarkId:
          type: string
          description: The ID of a bookmark in this document.
          example: '500123'
        headingId:
          type: string
          description: The ID of a heading in this document.
          example: '500123'
        tabId:
          type: string
          description: The ID of a tab in this document.

          example: '500123'
    OptionalColor:
      type: object
      description: >-
        A color that can either be fully opaque or fully transparent.
      properties:
        color:
          $ref: '#/components/schemas/Color'

    Color:
      type: object
      description: A solid color.
      properties:
        rgbColor:
          $ref: '#/components/schemas/RgbColor'

    RgbColor:
      type: object
      description: An RGB color.
      properties:
        red:
          type: number
          description: The red component of the color, from 0.0 to 1.0.
          example: 42.5
        green:
          type: number
          description: The green component of the color, from 0.0 to 1.0.
          example: 42.5
        blue:
          type: number
          description: The blue component of the color, from 0.0 to 1.0.

          example: 42.5
    Dimension:
      type: object
      description: A magnitude in a single direction in the specified units.
      properties:
        magnitude:
          type: number
          description: The magnitude.
          example: 42.5
        unit:
          type: string
          description: The units for magnitude.
          enum:
          - UNIT_UNSPECIFIED
          - PT

          example: UNIT_UNSPECIFIED
    Size:
      type: object
      description: >-
        A width and height.
      properties:
        height:
          $ref: '#/components/schemas/Dimension'
        width:
          $ref: '#/components/schemas/Dimension'

    WeightedFontFamily:
      type: object
      description: >-
        Represents a font family and weight of text.
      properties:
        fontFamily:
          type: string
          description: The font family of the text.
          example: example_value
        weight:
          type: integer
          description: >-
            The weight of the font. This field can have any value that is a
            multiple of 100 between 100 and 900, inclusive.

          example: 10
    ParagraphBorder:
      type: object
      description: A border around a paragraph.
      properties:
        color:
          $ref: '#/components/schemas/OptionalColor'
        width:
          $ref: '#/components/schemas/Dimension'
        padding:
          $ref: '#/components/schemas/Dimension'
        dashStyle:
          type: string
          enum:
          - DASH_STYLE_UNSPECIFIED
          - SOLID
          - DOT
          - DASH

          example: DASH_STYLE_UNSPECIFIED
    TabStop:
      type: object
      description: A tab stop within a paragraph.
      properties:
        offset:
          $ref: '#/components/schemas/Dimension'
        alignment:
          type: string
          description: The alignment of this tab stop.
          enum:
          - TAB_STOP_ALIGNMENT_UNSPECIFIED
          - START
          - CENTER
          - END

          example: TAB_STOP_ALIGNMENT_UNSPECIFIED
    Shading:
      type: object
      description: The shading of a paragraph.
      properties:
        backgroundColor:
          $ref: '#/components/schemas/OptionalColor'

    Background:
      type: object
      description: Represents the background of a document.
      properties:
        color:
          $ref: '#/components/schemas/OptionalColor'

    SuggestionsViewMode:
      type: string
      description: >-
        The suggestions view mode applied to the document, determining
        how changes from suggestions are represented.
      enum:
      - DEFAULT_FOR_CURRENT_ACCESS
      - SUGGESTIONS_INLINE
      - PREVIEW_SUGGESTIONS_ACCEPTED
      - PREVIEW_WITHOUT_SUGGESTIONS

    Location:
      type: object
      description: >-
        A particular location in the document.
      properties:
        segmentId:
          type: string
          description: >-
            The ID of the header, footer, or footnote the location is in.
            An empty segment ID signifies the document body.
          example: '500123'
        index:
          type: integer
          description: >-
            The zero-based index, in UTF-16 code units. The index is
            relative to the beginning of the segment specified by segmentId.
          example: 10
        tabId:
          type: string
          description: The tab that the location is in.

          example: '500123'
    BatchUpdateDocumentRequest:
      type: object
      description: >-
        Request message for BatchUpdateDocument.
      properties:
        requests:
          type: array
          description: >-
            A list of updates to apply to the document.
          items:
            $ref: '#/components/schemas/Request'
          example: []
        writeControl:
          $ref: '#/components/schemas/WriteControl'
      required:
      - requests

    BatchUpdateDocumentResponse:
      type: object
      description: >-
        Response message for BatchUpdateDocument.
      properties:
        documentId:
          type: string
          description: The ID of the document to which the updates were applied.
          example: '500123'
        replies:
          type: array
          description: >-
            The reply of the updates. This maps 1:1 with the updates,
            although replies to some requests may be empty.
          items:
            $ref: '#/components/schemas/Response'
          example: []
        writeControl:
          $ref: '#/components/schemas/WriteControl'

    WriteControl:
      type: object
      description: >-
        Provides control over how write requests are executed. When set
        on a request, it provides a way to detect conflicts.
      properties:
        requiredRevisionId:
          type: string
          description: >-
            The optional revision ID of the document the write request is
            applied to. If this is not the latest revision of the document,
            the request is not processed and returns a 400 bad request error.
          example: '500123'
        targetRevisionId:
          type: string
          description: >-
            The optional target revision ID of the document the write
            request is applied to. If collaborator changes have occurred
            after the document was read using the API, the changes produced
            by this write request are applied against the collaborator
            changes. This results in a resolved document.

          example: '500123'
    Request:
      type: object
      description: >-
        A single update to apply to a document. Exactly one field must
        be set.
      properties:
        insertText:
          $ref: '#/components/schemas/InsertTextRequest'
        deleteContentRange:
          $ref: '#/components/schemas/DeleteContentRangeRequest'
        insertInlineImage:
          $ref: '#/components/schemas/InsertInlineImageRequest'
        insertTable:
          $ref: '#/components/schemas/InsertTableRequest'
        insertTableRow:
          $ref: '#/components/schemas/InsertTableRowRequest'
        insertTableColumn:
          $ref: '#/components/schemas/InsertTableColumnRequest'
        deleteTableRow:
          $ref: '#/components/schemas/DeleteTableRowRequest'
        deleteTableColumn:
          $ref: '#/components/schemas/DeleteTableColumnRequest'
        insertPageBreak:
          $ref: '#/components/schemas/InsertPageBreakRequest'
        insertSectionBreak:
          $ref: '#/components/schemas/InsertSectionBreakRequest'
        deletePositionedObject:
          $ref: '#/components/schemas/DeletePositionedObjectRequest'
        updateTextStyle:
          $ref: '#/components/schemas/UpdateTextStyleRequest'
        updateParagraphStyle:
          $ref: '#/components/schemas/UpdateParagraphStyleRequest'
        updateTableCellStyle:
          $ref: '#/components/schemas/UpdateTableCellStyleRequest'
        updateTableRowStyle:
          $ref: '#/components/schemas/UpdateTableRowStyleRequest'
        updateTableColumnProperties:
          $ref: '#/components/schemas/UpdateTableColumnPropertiesRequest'
        updateDocumentStyle:
          $ref: '#/components/schemas/UpdateDocumentStyleRequest'
        updateSectionStyle:
          $ref: '#/components/schemas/UpdateSectionStyleRequest'
        replaceAllText:
          $ref: '#/components/schemas/ReplaceAllTextRequest'
        createNamedRange:
          $ref: '#/components/schemas/CreateNamedRangeRequest'
        deleteNamedRange:
          $ref: '#/components/schemas/DeleteNamedRangeRequest'
        replaceNamedRangeContent:
          $ref: '#/components/schemas/ReplaceNamedRangeContentRequest'
        createParagraphBullets:
          $ref: '#/components/schemas/CreateParagraphBulletsRequest'
        deleteParagraphBullets:
          $ref: '#/components/schemas/DeleteParagraphBulletsRequest'
        createHeader:
          $ref: '#/components/schemas/CreateHeaderRequest'
        createFooter:
          $ref: '#/components/schemas/CreateFooterRequest'
        createFootnote:
          $ref: '#/components/schemas/CreateFootnoteRequest'
        deleteHeader:
          $ref: '#/components/schemas/DeleteHeaderRequest'
        deleteFooter:
          $ref: '#/components/schemas/DeleteFooterRequest'
        replaceImage:
          $ref: '#/components/schemas/ReplaceImageRequest'
        mergeTableCells:
          $ref: '#/components/schemas/MergeTableCellsRequest'
        unmergeTableCells:
          $ref: '#/components/schemas/UnmergeTableCellsRequest'
        pinTableHeaderRows:
          $ref: '#/components/schemas/PinTableHeaderRowsRequest'

    InsertTextRequest:
      type: object
      description: Inserts text at the given location.
      properties:
        text:
          type: string
          description: >-
            The text to be inserted. Inserting a newline character will
            implicitly create a new Paragraph at that index.
          example: example_value
        location:
          $ref: '#/components/schemas/Location'
        endOfSegmentLocation:
          $ref: '#/components/schemas/EndOfSegmentLocation'
      required:
      - text

    DeleteContentRangeRequest:
      type: object
      description: Deletes content from the document.
      properties:
        range:
          $ref: '#/components/schemas/Range'
      required:
      - range

    InsertInlineImageRequest:
      type: object
      description: Inserts an InlineObject containing an image at the given location.
      properties:
        uri:
          type: string
          description: >-
            The image URI. The image is fetched once at insertion time and
            a copy is stored for display inside the document.
          example: example_value
        objectSize:
          $ref: '#/components/schemas/Size'
        location:
          $ref: '#/components/schemas/Location'
        endOfSegmentLocation:
          $ref: '#/components/schemas/EndOfSegmentLocation'
      required:
      - uri

    InsertTableRequest:
      type: object
      description: Inserts a table at the specified location.
      properties:
        rows:
          type: integer
          description: The number of rows in the table.
          example: 10
        columns:
          type: integer
          description: The number of columns in the table.
          example: 10
        location:
          $ref: '#/components/schemas/Location'
        endOfSegmentLocation:
          $ref: '#/components/schemas/EndOfSegmentLocation'
      required:
      - rows
      - columns

    InsertTableRowRequest:
      type: object
      description: Inserts an empty row into a table.
      properties:
        tableCellLocation:
          $ref: '#/components/schemas/TableCellLocation'
        insertBelow:
          type: boolean
          description: Whether to insert new row below the reference cell location.
          example: true
      required:
      - tableCellLocation
      - insertBelow

    InsertTableColumnRequest:
      type: object
      description: Inserts an empty column into a table.
      properties:
        tableCellLocation:
          $ref: '#/components/schemas/TableCellLocation'
        insertRight:
          type: boolean
          description: Whether to insert new column to the right of the reference cell.
          example: true
      required:
      - tableCellLocation
      - insertRight

    DeleteTableRowRequest:
      type: object
      description: Deletes a row from a table.
      properties:
        tableCellLocation:
          $ref: '#/components/schemas/TableCellLocation'
      required:
      - tableCellLocation

    DeleteTableColumnRequest:
      type: object
      description: Deletes a column from a table.
      properties:
        tableCellLocation:
          $ref: '#/components/schemas/TableCellLocation'
      required:
      - tableCellLocation

    InsertPageBreakRequest:
      type: object
      description: Inserts a page break at the given location.
      properties:
        location:
          $ref: '#/components/schemas/Location'
        endOfSegmentLocation:
          $ref: '#/components/schemas/EndOfSegmentLocation'

    InsertSectionBreakRequest:
      type: object
      description: Inserts a section break at the given location.
      properties:
        sectionType:
          type: string
          description: The type of section to insert.
          enum:
          - SECTION_TYPE_UNSPECIFIED
          - CONTINUOUS
          - NEXT_PAGE
          example: SECTION_TYPE_UNSPECIFIED
        location:
          $ref: '#/components/schemas/Location'
        endOfSegmentLocation:
          $ref: '#/components/schemas/EndOfSegmentLocation'

    DeletePositionedObjectRequest:
      type: object
      description: Deletes a PositionedObject from the document.
      properties:
        objectId:
          type: string
          description: The ID of the positioned object to delete.
          example: '500123'
        tabId:
          type: string
          description: The tab that the positioned object is in.
          example: '500123'
      required:
      - objectId

    UpdateTextStyleRequest:
      type: object
      description: >-
        Updates the styling of text in the document.
      properties:
        range:
          $ref: '#/components/schemas/Range'
        textStyle:
          $ref: '#/components/schemas/TextStyle'
        fields:
          type: string
          description: >-
            The fields that should be updated. At least one field must be
            specified. The root textStyle is implied and should not be
            specified. For example, to update the bold field, set fields
            to "bold".
          example: example_value
      required:
      - range
      - textStyle
      - fields

    UpdateParagraphStyleRequest:
      type: object
      description: >-
        Updates the styling of paragraphs in the document.
      properties:
        range:
          $ref: '#/components/schemas/Range'
        paragraphStyle:
          $ref: '#/components/schemas/ParagraphStyle'
        fields:
          type: string
          description: >-
            The fields that should be updated. At least one field must be
            specified.
          example: example_value
      required:
      - range
      - paragraphStyle
      - fields

    UpdateTableCellStyleRequest:
      type: object
      description: Updates the style of a range of table cells.
      properties:
        tableRange:
          $ref: '#/components/schemas/TableRange'
        tableCellStyle:
          $ref: '#/components/schemas/TableCellStyle'
        fields:
          type: string
          description: The fields that should be updated.
          example: example_value
        tableStartLocation:
          $ref: '#/components/schemas/Location'
      required:
      - tableCellStyle
      - fields

    UpdateTableRowStyleRequest:
      type: object
      description: Updates the style of a table row.
      properties:
        tableStartLocation:
          $ref: '#/components/schemas/Location'
        rowIndices:
          type: array
          description: The list of zero-based row indices whose style should be updated.
          items:
            type: integer
          example: []
        tableRowStyle:
          $ref: '#/components/schemas/TableRowStyle'
        fields:
          type: string
          description: The fields that should be updated.
          example: example_value
      required:
      - tableStartLocation
      - rowIndices
      - tableRowStyle
      - fields

    UpdateTableColumnPropertiesRequest:
      type: object
      description: Updates the properties of columns in a table.
      properties:
        tableStartLocation:
          $ref: '#/components/schemas/Location'
        columnIndices:
          type: array
          description: >-
            The list of zero-based column indices whose property should
            be updated.
          items:
            type: integer
          example: []
        tableColumnProperties:
          $ref: '#/components/schemas/TableColumnProperties'
        fields:
          type: string
          description: The fields that should be updated.
          example: example_value
      required:
      - tableStartLocation
      - columnIndices
      - tableColumnProperties
      - fields

    UpdateDocumentStyleRequest:
      type: object
      description: Updates the DocumentStyle.
      properties:
        documentStyle:
          $ref: '#/components/schemas/DocumentStyle'
        fields:
          type: string
          description: The fields that should be updated.
          example: example_value
        tabId:
          type: string
          description: The tab that contains the style to update.
          example: '500123'
      required:
      - documentStyle
      - fields

    UpdateSectionStyleRequest:
      type: object
      description: Updates the SectionStyle.
      properties:
        range:
          $ref: '#/components/schemas/Range'
        sectionStyle:
          $ref: '#/components/schemas/SectionStyle'
        fields:
          type: string
          description: The fields that should be updated.
          example: example_value
      required:
      - range
      - sectionStyle
      - fields

    ReplaceAllTextRequest:
      type: object
      description: Replaces all instances of text matching a criteria with replace text.
      properties:
        containsText:
          $ref: '#/components/schemas/SubstringMatchCriteria'
        replaceText:
          type: string
          description: The text that will replace the matched text.
          example: example_value
        tabsCriteria:
          $ref: '#/components/schemas/TabsCriteria'
      required:
      - containsText
      - replaceText

    SubstringMatchCriteria:
      type: object
      description: >-
        A criteria that matches a specific string of text in the document.
      properties:
        text:
          type: string
          description: The text to search for in the document.
          example: example_value
        matchCase:
          type: boolean
          description: Indicates whether the search should respect case.
          example: true
      required:
      - text

    TabsCriteria:
      type: object
      description: >-
        A criteria that specifies in which tabs a request executes.
      properties:
        tabIds:
          type: array
          description: >-
            The list of tab IDs in which the request executes. An empty
            list signifies that the request executes in all tabs.
          items:
            type: string

          example: []
    CreateNamedRangeRequest:
      type: object
      description: Creates a NamedRange referencing the given range.
      properties:
        name:
          type: string
          description: The name of the NamedRange. Names do not need to be unique.
          example: Example Title
        range:
          $ref: '#/components/schemas/Range'
      required:
      - name
      - range

    DeleteNamedRangeRequest:
      type: object
      description: Deletes a NamedRange.
      properties:
        namedRangeId:
          type: string
          description: The ID of the named range to delete.
          example: '500123'
        name:
          type: string
          description: >-
            The name of the range to delete. All named ranges with the
            given name will be deleted.
          example: Example Title
        tabsCriteria:
          $ref: '#/components/schemas/TabsCriteria'

    ReplaceNamedRangeContentRequest:
      type: object
      description: Replaces the content of the specified NamedRange.
      properties:
        namedRangeId:
          type: string
          description: The ID of the named range whose content will be replaced.
          example: '500123'
        namedRangeName:
          type: string
          description: >-
            The name of the named ranges whose content will be replaced.
          example: example_value
        text:
          type: string
          description: Replaces the content of the specified named range with the given text.
          example: example_value
        tabsCriteria:
          $ref: '#/components/schemas/TabsCriteria'

    CreateParagraphBulletsRequest:
      type: object
      description: >-
        Creates bullets for all of the paragraphs that overlap with the
        given range.
      properties:
        range:
          $ref: '#/components/schemas/Range'
        bulletPreset:
          type: string
          description: The kinds of bullet glyphs to be used.
          enum:
          - BULLET_GLYPH_PRESET_UNSPECIFIED
          - BULLET_DISC_CIRCLE_SQUARE
          - BULLET_DIAMONDX_ARROW3D_SQUARE
          - BULLET_CHECKBOX
          - BULLET_ARROW_DIAMOND_DISC
          - BULLET_STAR_CIRCLE_SQUARE
          - BULLET_ARROW3D_CIRCLE_SQUARE
          - BULLET_LEFTTRIANGLE_DIAMOND_DISC
          - BULLET_DIAMONDX_HOLLOWDIAMOND_SQUARE
          - BULLET_DIAMOND_CIRCLE_SQUARE
          - NUMBERED_DECIMAL_ALPHA_ROMAN
          - NUMBERED_DECIMAL_ALPHA_ROMAN_PARENS
          - NUMBERED_DECIMAL_NESTED
          - NUMBERED_UPPERALPHA_ALPHA_ROMAN
          - NUMBERED_UPPERROMAN_UPPERALPHA_DECIMAL
          - NUMBERED_ZERODECIMAL_ALPHA_ROMAN
          example: BULLET_GLYPH_PRESET_UNSPECIFIED
      required:
      - range
      - bulletPreset

    DeleteParagraphBulletsRequest:
      type: object
      description: >-
        Deletes bullets from all of the paragraphs that overlap with the
        given range.
      properties:
        range:
          $ref: '#/components/schemas/Range'
      required:
      - range

    CreateHeaderRequest:
      type: object
      description: Creates a Header.
      properties:
        type:
          type: string
          description: The type of header to create.
          enum:
          - HEADER_FOOTER_TYPE_UNSPECIFIED
          - DEFAULT
          example: HEADER_FOOTER_TYPE_UNSPECIFIED
        sectionBreakLocation:
          $ref: '#/components/schemas/Location'
      required:
      - type

    CreateFooterRequest:
      type: object
      description: Creates a Footer.
      properties:
        type:
          type: string
          description: The type of footer to create.
          enum:
          - HEADER_FOOTER_TYPE_UNSPECIFIED
          - DEFAULT
          example: HEADER_FOOTER_TYPE_UNSPECIFIED
        sectionBreakLocation:
          $ref: '#/components/schemas/Location'
      required:
      - type

    CreateFootnoteRequest:
      type: object
      description: Creates a Footnote segment and inserts a new FootnoteReference.
      properties:
        location:
          $ref: '#/components/schemas/Location'
        endOfSegmentLocation:
          $ref: '#/components/schemas/EndOfSegmentLocation'

    DeleteHeaderRequest:
      type: object
      description: Deletes a Header from the document.
      properties:
        headerId:
          type: string
          description: The ID of the header to delete.
          example: '500123'
        tabId:
          type: string
          description: The tab containing the header to delete.
          example: '500123'
      required:
      - headerId

    DeleteFooterRequest:
      type: object
      description: Deletes a Footer from the document.
      properties:
        footerId:
          type: string
          description: The ID of the footer to delete.
          example: '500123'
        tabId:
          type: string
          description: The tab containing the footer to delete.
          example: '500123'
      required:
      - footerId

    ReplaceImageRequest:
      type: object
      description: >-
        Replaces an existing image with a new image. Replacing an image
        removes some image effects from the existing image in order to
        mirror the behavior of the Docs editor.
      properties:
        imageObjectId:
          type: string
          description: The ID of the existing image that will be replaced.
          example: '500123'
        uri:
          type: string
          description: >-
            The URI of the new image. The image is fetched once at insertion
            time and a copy is stored for display inside the document.
          example: example_value
        imageReplaceMethod:
          type: string
          description: The replacement method.
          enum:
          - IMAGE_REPLACE_METHOD_UNSPECIFIED
          - CENTER_CROP
          example: IMAGE_REPLACE_METHOD_UNSPECIFIED
        tabId:
          type: string
          description: The tab that the image to be replaced is in.
          example: '500123'
      required:
      - imageObjectId
      - uri

    MergeTableCellsRequest:
      type: object
      description: Merges cells in a table.
      properties:
        tableRange:
          $ref: '#/components/schemas/TableRange'
      required:
      - tableRange

    UnmergeTableCellsRequest:
      type: object
      description: Unmerges cells in a table.
      properties:
        tableRange:
          $ref: '#/components/schemas/TableRange'
      required:
      - tableRange

    PinTableHeaderRowsRequest:
      type: object
      description: >-
        Updates the number of pinned table header rows in a table.
      properties:
        tableStartLocation:
          $ref: '#/components/schemas/Location'
        pinnedHeaderRowsCount:
          type: integer
          description: >-
            The number of table rows to pin, where 0 implies that all
            rows are unpinned.
          example: 10
      required:
      - tableStartLocation
      - pinnedHeaderRowsCount

    TableCellLocation:
      type: object
      description: Location of a single cell within a table.
      properties:
        tableStartLocation:
          $ref: '#/components/schemas/Location'
        rowIndex:
          type: integer
          description: The zero-based row index.
          example: 10
        columnIndex:
          type: integer
          description: The zero-based column index.

          example: 10
    TableRange:
      type: object
      description: >-
        A table range represents a reference to a subset of a table.
      properties:
        tableCellLocation:
          $ref: '#/components/schemas/TableCellLocation'
        rowSpan:
          type: integer
          description: The row span of the table range.
          example: 10
        columnSpan:
          type: integer
          description: The column span of the table range.

          example: 10
    EndOfSegmentLocation:
      type: object
      description: >-
        Location at the end of a body, header, footer, or footnote.
      properties:
        segmentId:
          type: string
          description: >-
            The ID of the header, footer, or footnote the location is in.
            An empty segment ID signifies the document body.
          example: '500123'
        tabId:
          type: string
          description: The tab that the location is in.

          example: '500123'
    Response:
      type: object
      description: >-
        A single response from an update. The result of applying each
        request in a batch update.
      properties:
        createNamedRange:
          $ref: '#/components/schemas/CreateNamedRangeResponse'
        insertInlineImage:
          $ref: '#/components/schemas/InsertInlineImageResponse'
        insertInlineSheetsChart:
          $ref: '#/components/schemas/InsertInlineSheetsChartResponse'
        createHeader:
          $ref: '#/components/schemas/CreateHeaderResponse'
        createFooter:
          $ref: '#/components/schemas/CreateFooterResponse'
        createFootnote:
          $ref: '#/components/schemas/CreateFootnoteResponse'
        replaceAllText:
          $ref: '#/components/schemas/ReplaceAllTextResponse'

    CreateNamedRangeResponse:
      type: object
      description: The result of creating a named range.
      properties:
        namedRangeId:
          type: string
          description: The ID of the created named range.

          example: '500123'
    InsertInlineImageResponse:
      type: object
      description: The result of inserting an inline image.
      properties:
        objectId:
          type: string
          description: The ID of the created InlineObject.

          example: '500123'
    InsertInlineSheetsChartResponse:
      type: object
      description: The result of inserting an inline Sheets chart.
      properties:
        objectId:
          type: string
          description: The object ID of the created chart.

          example: '500123'
    CreateHeaderResponse:
      type: object
      description: The result of creating a header.
      properties:
        headerId:
          type: string
          description: The ID of the created header.

          example: '500123'
    CreateFooterResponse:
      type: object
      description: The result of creating a footer.
      properties:
        footerId:
          type: string
          description: The ID of the created footer.

          example: '500123'
    CreateFootnoteResponse:
      type: object
      description: The result of creating a footnote.
      properties:
        footnoteId:
          type: string
          description: The ID of the created footnote.

          example: '500123'
    ReplaceAllTextResponse:
      type: object
      description: The result of replacing text.
      properties:
        occurrencesChanged:
          type: integer
          description: The number of occurrences changed.

          example: 10
    Error:
      type: object
      description: >-
        Error response from the Google Docs API.
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              description: The HTTP status code.
            message:
              type: string
              description: A human-readable description of the error.
            status:
              type: string
              description: The status code string.
            details:
              type: array
              description: Additional error details.
              items:
                type: object
          example: example_value
