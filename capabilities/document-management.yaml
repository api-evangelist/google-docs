naftiko: 1.0.0-alpha2
info:
  label: Google Docs Document Management
  description: Unified workflow for creating, reading, and editing Google Docs documents including content manipulation, formatting,
    and template automation. Used by developers automating document workflows.
  tags:
  - Google Docs
  - Document Management
  - Google Workspace
  - Automation
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    GOOGLE_OAUTH_TOKEN: GOOGLE_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: docs-api
    baseUri: https://docs.googleapis.com
    description: Google Docs API v1 for document management.
    authentication:
      type: bearer
      token: '{{GOOGLE_OAUTH_TOKEN}}'
    resources:
    - name: documents
      path: /v1/documents
      description: Create Google Docs documents.
      operations:
      - name: create-document
        method: POST
        description: Create a blank document with the given title.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
    - name: document-details
      path: /v1/documents/{documentId}
      description: Read and manage individual documents.
      operations:
      - name: get-document
        method: GET
        description: Get the latest version of a document.
        inputParameters:
        - name: documentId
          in: path
          type: string
          required: true
          description: The ID of the document.
        - name: suggestionsViewMode
          in: query
          type: string
          required: false
          description: Suggestions view mode.
        - name: includeTabsContent
          in: query
          type: boolean
          required: false
          description: Whether to populate the Document.tabs field.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: document-batch-update
      path: /v1/documents/{documentId}:batchUpdate
      description: Apply batch updates to a document.
      operations:
      - name: batch-update-document
        method: POST
        description: Apply one or more updates to a document.
        inputParameters:
        - name: documentId
          in: path
          type: string
          required: true
          description: The ID of the document to update.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            requests: '{{tools.requests}}'
  exposes:
  - type: rest
    port: 8080
    namespace: docs-management-api
    description: Unified REST API for Google Docs document management.
    resources:
    - path: /v1/documents
      name: documents
      description: Document creation.
      operations:
      - method: POST
        name: create-document
        description: Create a new document.
        call: docs-api.create-document
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/documents/{id}
      name: document-details
      description: Document retrieval and updates.
      operations:
      - method: GET
        name: get-document
        description: Get a document by ID.
        call: docs-api.get-document
        with:
          documentId: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/documents/{id}/batch-update
      name: document-updates
      description: Document batch updates.
      operations:
      - method: POST
        name: batch-update-document
        description: Apply batch updates to a document.
        call: docs-api.batch-update-document
        with:
          documentId: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: docs-management-mcp
    transport: http
    description: MCP server for AI-assisted Google Docs document management.
    tools:
    - name: create-document
      description: Create a new Google Docs document with a title.
      hints:
        readOnly: false
      call: docs-api.create-document
      outputParameters:
      - type: object
        mapping: $.
    - name: get-document
      description: Retrieve a Google Docs document by its ID.
      hints:
        readOnly: true
        idempotent: true
      call: docs-api.get-document
      with:
        documentId: tools.documentId
      outputParameters:
      - type: object
        mapping: $.
    - name: batch-update-document
      description: Apply batch updates to insert, replace, or delete content in a document.
      hints:
        readOnly: false
      call: docs-api.batch-update-document
      with:
        documentId: tools.documentId
      outputParameters:
      - type: object
        mapping: $.
